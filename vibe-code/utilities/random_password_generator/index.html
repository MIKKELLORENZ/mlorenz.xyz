<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Password</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- --- Google Font for that extra style --- -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
    /* =====  GLOBAL LOOK  ===== */
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
        font-family:"Poppins",sans-serif;
        min-height:100vh;
        display:flex;
        align-items:center;
        justify-content:center;
        background:linear-gradient(135deg,#1d2b64,#f8cdda);
        color:#fff;
    }

    /* =====  CARD / GLASSMORPHIC CONTAINER  ===== */
    .card{
        width:clamp(320px,90vw,520px);
        padding:2.5rem 2rem 3rem;
        position:relative;
        border-radius:1.25rem;
        background:rgba(255,255,255,.08);
        backdrop-filter:blur(18px) saturate(180%);
        box-shadow:0 1.25rem 2.5rem rgba(0,0,0,.25);
    }
    h1{
        text-align:center;
        letter-spacing:.05em;
        font-weight:700;
        margin-bottom:1.6rem;
        text-transform:uppercase;
    }

    /* =====  PASSWORD DISPLAY  ===== */
    .password-wrapper{
        position:relative;
        display:flex;
        align-items:center;
        margin:0 auto 2rem;
        gap:.35rem;
    }
    #password{
        width:100%;
        padding:.9rem 1rem;
        font-size:clamp(.85rem,3vw,.95rem);
        border:none;
        border-radius:.8rem;
        background:rgba(0,0,0,.15);
        color:#e4fffe;
        letter-spacing:.07em;
        font-weight:500;
    }
    #password:focus{outline:none;}
    #password::placeholder{
        color:rgba(228,255,254,.72);
        letter-spacing:normal;
    }

    .password-actions{
        position:absolute;
        right:.35rem;
        display:flex;
        align-items:center;
        gap:.15rem;
    }

    /* action buttons */
    #copyBtn,
    #toggleVisibilityBtn{
        background:transparent;
        border:none;
        color:#fff;
        cursor:pointer;
        display:flex;
        align-items:center;
        justify-content:center;
        padding:.45rem;
        border-radius:.6rem;
        transition:transform .15s ease, background .18s ease, opacity .18s ease;
    }
    #copyBtn svg,
    #toggleVisibilityBtn svg{width:1.1rem;height:1.1rem;pointer-events:none;}
    #copyBtn:hover,
    #toggleVisibilityBtn:hover{
        transform:scale(1.08);
        background:rgba(255,255,255,.12);
    }
    #copyBtn:disabled,
    #toggleVisibilityBtn:disabled{
        cursor:not-allowed;
        opacity:.45;
        transform:none;
        background:transparent;
    }

    /* =====  SETTINGS  ===== */
    .settings{
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:1.1rem .75rem;
    }
    .row{
        display:flex;
        align-items:center;
        gap:.45rem;
        font-size:.9rem;
        user-select:none;
    }
    /* numeric length input */
    .length-row { /* Added class for length row */
        grid-column: 1 / -1; /* Span across both columns */
        justify-content: flex-start; /* Align items to the start */
        margin-bottom: 0.5rem; /* Add some space below length */
    }
    #length{
        width:4.2rem;
        padding:.3rem .55rem;
        border-radius:.45rem;
        border:none;
        font-weight:600;
        background:rgba(0,0,0,.2);
        color:#fff;
        text-align:center;
    }
    #length:focus{outline:2px solid #fff4;}

    /* checkboxes – custom look */
    input[type="checkbox"]{
        appearance:none;
        width:1.05rem;
        height:1.05rem;
        border:2px solid #fff8;
        border-radius:.25rem;
        position:relative;
        cursor:pointer;
        transition:background .15s ease,border-color .15s ease;
    }

    /* Remove the old ::after rule */
    /* input[type="checkbox"]:checked::after{ ... } */

    /* Add new ::after rule for the checkmark */
    input[type="checkbox"]:checked::after{
        content: '';
        position: absolute;
        left: 0.3rem;
        top: 0.05rem;
        width: 0.25rem;
        height: 0.6rem;
        border: solid white;
        border-width: 0 2px 2px 0;
        transform: rotate(45deg);
    }

    /* ===== Refresh Button Style ===== */
    #refreshBtn {
        grid-column: 1 / -1; /* Span across both columns */
        margin-top: 1.5rem;
        padding: .7rem 1rem;
        font-size: .95rem;
        font-weight: 600;
        letter-spacing: .04em;
        color: #1d2b64;
        background: #fff;
        border: none;
        border-radius: .6rem;
        cursor: pointer;
        transition: background .2s ease, transform .1s ease;
        box-shadow: 0 4px 10px rgba(0,0,0,.15);
    }
    #refreshBtn:hover {
        background: #f0f0f0;
    }
    #refreshBtn:active {
        transform: scale(0.98);
        box-shadow: 0 2px 5px rgba(0,0,0,.1);
    }

    /* =====  Toast (copy feedback)  ===== */
    .toast{
        position:fixed;
        top:1.25rem;
        left:50%;
        transform:translateX(-50%) translateY(-14px) scale(.96);
        background:rgba(9,12,20,.82);
        border:1px solid rgba(255,255,255,.14);
        box-shadow:0 14px 32px rgba(5,8,16,.28);
        backdrop-filter:blur(16px);
        padding:.7rem 1rem;
        border-radius:999px;
        font-size:.82rem;
        font-weight:500;
        letter-spacing:.02em;
        opacity:0;
        pointer-events:none;
        transition:opacity .2s ease,transform .2s ease;
        z-index:20;
    }
    .toast.show{
        opacity:1;
        transform:translateX(-50%) translateY(0) scale(1);
    }
</style>
</head>
<body>

<div class="card">
    <h1>Random Password</h1>

    <!-- Password display & copy -->
    <div class="password-wrapper">
        <input id="password" type="password" readonly placeholder="Generating password...">
        <div class="password-actions">
            <button id="toggleVisibilityBtn" aria-label="Show password" aria-pressed="false">
                <svg id="visibilityOnIcon" viewBox="0 0 24 24" fill="currentColor">
                    <path d="M12 5c5.23 0 9.27 3.11 11 7-1.73 3.89-5.77 7-11 7S2.73 15.89 1 12c1.73-3.89 5.77-7 11-7zm0 2C7.89 7 4.55 9.28 3.08 12 4.55 14.72 7.89 17 12 17s7.45-2.28 8.92-5C19.45 9.28 16.11 7 12 7zm0 2.5A2.5 2.5 0 1 1 9.5 12 2.5 2.5 0 0 1 12 9.5z"/>
                </svg>
                <svg id="visibilityOffIcon" viewBox="0 0 24 24" fill="currentColor" hidden>
                    <path d="m3.28 2 18.44 18.44-1.41 1.41-3.03-3.03A11.78 11.78 0 0 1 12 20c-5.23 0-9.27-3.11-11-7a13.87 13.87 0 0 1 4.13-4.89L1.86 3.41 3.28 2zm4.7 7.53A4.5 4.5 0 0 0 12 16.5c.72 0 1.4-.17 2-.46l-1.61-1.61A2.5 2.5 0 0 1 9.57 11.6zM12 5c5.23 0 9.27 3.11 11 7a13.9 13.9 0 0 1-4.36 5l-1.45-1.45A11.1 11.1 0 0 0 20.92 12C19.45 9.28 16.11 7 12 7c-1 0-1.94.14-2.82.4L7.53 5.75A12.9 12.9 0 0 1 12 5zm-.36 3.02A4.5 4.5 0 0 1 15.98 12c0 .44-.06.87-.18 1.28l-4.44-4.44c.09-.28.19-.55.28-.82z"/>
                </svg>
            </button>
            <button id="copyBtn" aria-label="Copy password">
                <svg viewBox="0 0 24 24" fill="currentColor">
                    <path d="M16 1H4a2 2 0 0 0-2 2v14h2V3h12V1zM19 5H8a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h11a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16H8V7h11v14z"/>
                </svg>
            </button>
        </div>
    </div>

    <!-- Settings -->
    <div class="settings">
        <div class="row length-row"> <!-- Added class to length row -->
            <label for="length">Length</label>
            <input id="length" type="number" min="4" max="1048576" value="36">
        </div>

        <!-- Checkboxes arranged in 2x2 grid -->
        <label class="row"><input type="checkbox" id="uppercase" checked>Chars. Uppercase</label>
        <label class="row"><input type="checkbox" id="lowercase" checked>Chars. Lowercase</label>
        <label class="row"><input type="checkbox" id="numbers" checked>Numbers</label>
        <label class="row"><input type="checkbox" id="special"  checked>Special&nbsp;Characters</label>

        <!-- Add Refresh Button -->
        <button id="refreshBtn">New</button>
    </div>
</div>

<!-- copy feedback -->
<div id="toast" class="toast">Copied!</div>

<script>
/* ===== CHARACTER SETS ===== */
const sets = {
    uppercase:"ABCDEFGHIJKLMNOPQRSTUVWXYZ",
    lowercase:"abcdefghijklmnopqrstuvwxyz",
    numbers:"0123456789",
    special:"!@#$%^&*()_+-=[]{}|;:',.<>/?`~",
};

/* ===== DOM SHORTCUTS ===== */
const passEl       = document.getElementById('password'),
      copyBtn      = document.getElementById('copyBtn'),
    toggleVisibilityBtn = document.getElementById('toggleVisibilityBtn'),
    visibilityOnIcon = document.getElementById('visibilityOnIcon'),
    visibilityOffIcon = document.getElementById('visibilityOffIcon'),
      lengthEl     = document.getElementById('length'),
      uppercaseEl  = document.getElementById('uppercase'),
      lowercaseEl  = document.getElementById('lowercase'),
      numbersEl    = document.getElementById('numbers'),
      specialEl    = document.getElementById('special'),
      // charsEl      = document.getElementById('characters'), // This element doesn't exist in the provided HTML
      toast        = document.getElementById('toast'),
      refreshBtn   = document.getElementById('refreshBtn'); // Added refresh button shortcut

let toastTimer = null;

function showToast(message){
    toast.textContent = message;
    toast.classList.add('show');

    if (toastTimer) {
        clearTimeout(toastTimer);
    }

    toastTimer = setTimeout(() => {
        toast.classList.remove('show');
    }, 1150);
}

function setPasswordVisibility(isVisible){
    passEl.type = isVisible ? 'text' : 'password';
    toggleVisibilityBtn.setAttribute('aria-label', isVisible ? 'Hide password' : 'Show password');
    toggleVisibilityBtn.setAttribute('aria-pressed', String(isVisible));
    visibilityOnIcon.hidden = isVisible;
    visibilityOffIcon.hidden = !isVisible;
}

function updateActionState(enabled){
    copyBtn.disabled = !enabled;
    toggleVisibilityBtn.disabled = !enabled;
}

async function copyPasswordToClipboard(password, message){
    if (!password) {
        return false;
    }

    try {
        await navigator.clipboard.writeText(password);
        showToast(message);
        return true;
    } catch (error) {
        const fallbackInput = document.createElement('textarea');
        fallbackInput.value = password;
        fallbackInput.setAttribute('readonly', '');
        fallbackInput.style.position = 'absolute';
        fallbackInput.style.left = '-9999px';
        document.body.appendChild(fallbackInput);
        fallbackInput.select();

        try {
            document.execCommand('copy');
            showToast(message);
            return true;
        } catch (fallbackError) {
            console.error('Failed to copy password:', fallbackError || error);
            showToast('Clipboard unavailable');
            return false;
        } finally {
            document.body.removeChild(fallbackInput);
        }
    }
}

function generatePassword(){
    let length = +lengthEl.value || 32; // Default to 32 if value is invalid
    if (length < 4) length = 4;       // Enforce minimum length
    if (length > 1048576) length = 1048576;   // Enforce maximum length
    lengthEl.value = length;          // Update input value if adjusted

    let pool   = "";

    /* Build the character pool based on checked options */
    // Note: Removed the 'characters' checkbox logic as it wasn't in the final HTML structure provided
    if(uppercaseEl.checked) pool += sets.uppercase;
    if(lowercaseEl.checked) pool += sets.lowercase;
    if(numbersEl.checked)   pool += sets.numbers;
    if(specialEl.checked)   pool += sets.special;

    /* guard: at least one set must be selected */
    if(!pool){
        passEl.value = "";
        passEl.placeholder = "Select at least 1 option";
        updateActionState(false);
        return null;
    }

    updateActionState(true);
    passEl.placeholder = "";


    let pass = "";
    // Use crypto.getRandomValues for better randomness if available
    if (window.crypto && window.crypto.getRandomValues) {
        const randomValues = new Uint32Array(length);
        window.crypto.getRandomValues(randomValues);
        for (let i = 0; i < length; i++) {
            pass += pool[randomValues[i] % pool.length];
        }
    } else {
        // Fallback to Math.random if crypto API is not available
        console.warn("Crypto API not available, using Math.random (less secure).");
        for(let i=0;i<length;i++){
            pass += pool[Math.floor(Math.random()*pool.length)];
        }
    }
    passEl.value = pass;
    return pass;
}

/* Copy to clipboard + toast feedback */
copyBtn.addEventListener('click',()=>{
    copyPasswordToClipboard(passEl.value, 'Password copied');
});

toggleVisibilityBtn.addEventListener('click',()=>{
    setPasswordVisibility(passEl.type === 'password');
});

/* Regenerate when settings change */
// Select all inputs within .settings *except* the length input
document.querySelectorAll('.settings input:not(#length)').forEach(el=>{
    el.addEventListener('input', generatePassword);
});
// Add separate listener for length input to avoid triggering on every number typed
lengthEl.addEventListener('change', generatePassword);


/* Regenerate when refresh button is clicked */
refreshBtn.addEventListener('click', async ()=>{
    const password = generatePassword();
    if (password) {
        await copyPasswordToClipboard(password, 'New password copied');
    }
});


/* First run – generate password on load */
generatePassword();
setPasswordVisibility(false);
</script>

</body>
</html>
