<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Wallpaper</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <canvas id="stage"></canvas>

    <div class="ui-overlay" id="uiOverlay">
        <aside class="picker" id="picker">
            <header class="picker-header">
                <span class="picker-title">Live Wallpaper</span>
                <button class="icon-btn picker-collapse" id="pickerCollapse" aria-label="Collapse picker" title="Collapse">
                    <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
                </button>
            </header>
            <div class="picker-list" id="pickerList"></div>
        </aside>

        <button class="picker-reveal hidden" id="pickerReveal" aria-label="Show picker" title="Show picker">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>

        <div class="controls" id="controls">
            <button class="icon-btn" id="hideUiBtn" aria-label="Hide UI" title="Hide UI (H)">
                <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
            <button class="icon-btn" id="fullscreenBtn" aria-label="Toggle fullscreen" title="Fullscreen (F)">
                <svg id="fsEnterIcon" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>
                <svg id="fsExitIcon" class="hidden" viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3v6H3M15 3v6h6M9 21v-6H3M15 21v-6h6"/></svg>
            </button>
        </div>

        <div class="hidden-hint hidden" id="hiddenHint">Press <kbd>H</kbd> or move your mouse to show UI</div>
    </div>

    <script src="themes/base.js"></script>
    <script src="themes/matrix/matrix.js"></script>
    <script src="themes/island/island.js"></script>
    <script src="themes/konbini/konbini.js"></script>
    <script src="themes/suburb/suburb.js"></script>
    <script src="themes/alley/alley.js"></script>
    <script src="script.js"></script>
</body>
</html>
