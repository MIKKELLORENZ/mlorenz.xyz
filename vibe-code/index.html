<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Code - Projects Gallery</title>
    <meta name="description" content="A gallery of interactive experiments by Mikkel Lorenz — physics simulations, games, and browser tools, all vibe-coded for fun.">
    <link rel="canonical" href="https://mlorenz.xyz/vibe-code/">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mlorenz.xyz/vibe-code/">
    <meta property="og:title" content="Vibe Code — Projects Gallery">
    <meta property="og:description" content="Physics simulations, games, and browser tools, all vibe-coded for fun.">
    <meta property="og:image" content="https://mlorenz.xyz/vibe-code/simulations/cosmo_lab/thumbnail.jpg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script>
        // Apply saved theme before first paint to avoid a flash of the wrong theme
        (function () {
            var t = null;
            try { t = localStorage.getItem('theme'); } catch (e) {}
            if (t !== 'dark' && t !== 'light') {
                t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.classList.add(t === 'dark' ? 'dark-mode' : 'light-mode');
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Grain overlay -->
    <div class="grain-overlay" aria-hidden="true"></div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">MLORENZ<span class="logo-dot">.</span>XYZ</div>
            <div class="nav-items">
                <a href="../index.html">Home</a>
                <a href="index.html" class="active" aria-current="page">Vibe Code</a>
                <a href="../inventions/index.html">Inventions</a>
                <a href="../consultancy/index.html">Consultancy</a>
            </div>
            <button id="theme-toggle" aria-label="Toggle dark mode">
                ☀️
            </button>
        </div>
    </nav>

    <main class="container" id="main-content">
        <h1 class="sr-only">Vibe Code — Projects Gallery</h1>
        <div class="search-container">
            <div class="search-row">
                <input type="text" id="search-input" placeholder="Search projects..." class="search-input" aria-label="Search projects">
                <select id="category-filter" class="filter-select" aria-label="Filter by category">
                    <option value="all">All Categories</option>
                    <option value="games">Games</option>
                    <option value="simulations">Simulations</option>
                    <option value="utilities">Utilities</option>
                </select>
                <select id="sort-options" class="filter-select" aria-label="Sort projects">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="az">A-Z</option>
                    <option value="za">Z-A</option>
                </select>
                <button id="apply-filters" class="filter-button">Apply</button>
            </div>
            <div class="filter-tags" id="active-filters">
                <!-- Active filters will be added here by JS -->
            </div>
        </div>

        <div class="projects-container" id="projects-container">
            <!-- Projects will be loaded here by JS -->
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 — Mikkel Lorenz</p>
        </div>
    </footer>

    <script src="../js/darkmode.js" defer></script>
    <script src="../js/projects.js" defer></script>
</body>
</html>
