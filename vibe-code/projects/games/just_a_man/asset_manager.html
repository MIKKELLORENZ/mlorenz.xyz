    <style>
:root {
    --bg: #0f0f13;
    --bg2: #16161d;
    --bg3: #1e1e28;
    --bg4: #282835;
    --border: #2a2a3a;
    --border-light: #3a3a4e;
    --text: #e0e0e8;
    --text-dim: #7a7a90;
    --accent: #e2b714;
    --accent-dim: rgba(226,183,20,0.15);
    --green: #44cc66;
    --red: #cc4444;
    --blue: #4488dd;
    --pink: #dd4488;
    --radius: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

/* === NAV === */
.nav {
    display: flex; align-items: center; background: var(--bg2);
    border-bottom: 1px solid var(--border); padding: 0 24px; height: 52px; gap: 8px;
    position: sticky; top: 0; z-index: 100;
}
.nav-title { font-weight: 700; font-size: 14px; color: var(--accent); margin-right: 32px; letter-spacing: 1px; }
.nav-tab {
    padding: 14px 20px; font-size: 13px; font-weight: 500; color: var(--text-dim);
    cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.2s;
}
.nav-tab:hover { color: var(--text); }
.nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.nav-spacer { flex: 1; }
.nav-stat { font-size: 11px; color: var(--text-dim); padding: 4px 10px; background: var(--bg3); border-radius: 12px; margin-left: 6px; }
.nav-stat b { color: var(--green); }

/* === PATH BAR === */
.path-bar {
    display: flex; align-items: center; gap: 12px; padding: 10px 24px;
    background: var(--bg2); border-bottom: 1px solid var(--border); font-size: 11px;
}
.path-bar label { color: var(--text-dim); white-space: nowrap; }
.path-bar code {
    background: var(--bg4); padding: 4px 10px; border-radius: 4px;
    color: var(--accent); font-family: monospace; font-size: 11px;
}
.path-bar .scan-btn {
    padding: 4px 12px; font-size: 11px; background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: 4px; color: var(--accent); cursor: pointer; margin-left: auto;
}
.path-bar .scan-btn:hover { background: var(--accent); color: var(--bg); }

/* === PANELS === */
.panel { display: none; padding: 24px; }
.panel.active { display: block; }

/* === TOOLBAR === */
.toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.search-box {
    flex: 1; min-width: 200px; padding: 8px 14px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--radius); color: var(--text);
    font-size: 13px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.filter-btn {
    padding: 6px 14px; font-size: 12px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text-dim); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* === IMAGE GRID === */
.image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 16px; }
.image-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    overflow: hidden; transition: border-color 0.2s;
}
.image-card:hover { border-color: var(--border-light); }
.image-card.found { border-color: var(--green); }
.image-card.found .card-status { color: var(--green); }

.card-preview {
    width: 100%; aspect-ratio: 16/9; background: var(--bg4);
    display: flex; align-items: center; justify-content: center;
    position: relative; cursor: pointer; overflow: hidden;
}
.card-preview.square { aspect-ratio: 1/1; max-height: 140px; }
.card-preview img { width: 100%; height: 100%; object-fit: cover; }
.card-preview .placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 6px; color: var(--text-dim);
}
.card-preview .plus { font-size: 32px; font-weight: 300; color: var(--border-light); line-height: 1; }
.card-preview .plus-text { font-size: 10px; }
.card-preview:hover .plus { color: var(--accent); }

.card-info { padding: 10px 12px; }
.card-title { font-size: 11px; font-weight: 600; color: var(--text); margin-bottom: 2px; word-break: break-all; }
.card-category { font-size: 10px; color: var(--text-dim); margin-bottom: 4px; }
.card-path { font-size: 9px; color: var(--text-dim); font-family: monospace; opacity: 0.6; margin-bottom: 6px; word-break: break-all; }
.card-status { font-size: 10px; color: var(--text-dim); }
.card-actions { display: flex; gap: 6px; margin-top: 6px; }
.card-btn {
    padding: 4px 10px; font-size: 10px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim); cursor: pointer; transition: all 0.15s;
}
.card-btn:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

/* === AUDIO GRID === */
.audio-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 10px; }
.audio-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 12px 14px; display: flex; align-items: center; gap: 10px; transition: border-color 0.2s;
}
.audio-card:hover { border-color: var(--border-light); }
.audio-card.found { border-color: var(--green); }
.audio-icon {
    width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 14px; flex-shrink: 0; cursor: pointer; transition: all 0.2s;
}
.audio-icon.music { background: rgba(68,136,221,0.15); color: var(--blue); }
.audio-icon.ambient { background: rgba(68,204,102,0.15); color: var(--green); }
.audio-icon.sfx { background: rgba(221,68,136,0.15); color: var(--pink); }
.audio-icon:hover { transform: scale(1.1); }
.audio-icon.playing { animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); } }
.audio-info { flex: 1; min-width: 0; }
.audio-name { font-size: 11px; font-weight: 600; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.audio-type { font-size: 10px; color: var(--text-dim); }
.audio-path { font-size: 9px; color: var(--text-dim); font-family: monospace; opacity: 0.6; }
.audio-file-btn {
    padding: 4px 10px; font-size: 10px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim); cursor: pointer; flex-shrink: 0;
}
.audio-file-btn:hover { color: var(--accent); border-color: var(--accent); }

/* === PROMPT TAB === */
.prompt-grid { display: flex; flex-direction: column; gap: 16px; }
.prompt-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.prompt-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px; background: var(--bg3); cursor: pointer;
}
.prompt-title { font-size: 12px; font-weight: 600; }
.prompt-badge { font-size: 10px; padding: 2px 8px; border-radius: 10px; background: var(--accent-dim); color: var(--accent); }
.prompt-body { padding: 16px; display: none; }
.prompt-card.open .prompt-body { display: block; }
.prompt-section { margin-bottom: 14px; }
.prompt-label { font-size: 10px; font-weight: 600; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.prompt-text {
    font-size: 12px; line-height: 1.7; color: var(--text); background: var(--bg4);
    padding: 12px 14px; border-radius: 4px; border: 1px solid var(--border);
    position: relative; white-space: pre-wrap;
}
.prompt-note { font-size: 11px; color: var(--text-dim); line-height: 1.6; padding: 8px 0; }
.copy-btn {
    position: absolute; top: 8px; right: 8px; padding: 4px 10px; font-size: 10px;
    background: var(--bg2); border: 1px solid var(--border); border-radius: 4px;
    color: var(--text-dim); cursor: pointer;
}
.copy-btn:hover { color: var(--accent); border-color: var(--accent); }
.copy-btn.copied { color: var(--green); border-color: var(--green); }

/* toast */
.toast {
    position: fixed; bottom: 24px; right: 24px; padding: 10px 20px;
    background: var(--bg3); border: 1px solid var(--green); border-radius: var(--radius);
    color: var(--green); font-size: 12px; z-index: 200;
    opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

.hidden-input { display: none; }
    </style>
</head>

// ============================================
// SCAN STATE: which files actually exist
// ============================================
let foundImages = {};   // id -> true/false
let foundAudio = {};    // id -> true/false

function getImagePath(id) {
    return ITEM_DATA[id] ? IMAGE_BASE + 'items/' + id + '.png' : IMAGE_BASE + id + '.png';
}
function getAudioPath(id) { return AUDIO_BASE + id + '.mp3'; }

// Probe a URL via fetch HEAD or Image load
function probeImage(url) {
    return new Promise(resolve => {
        const img = new Image();
        img.onload = () => resolve(true);
        img.onerror = () => resolve(false);
        img.src = url + '?t=' + Date.now();
    });
}
function probeAudio(url) {
    return new Promise(resolve => {
        const a = new Audio();
        a.preload = 'metadata';
        a.onloadedmetadata = () => { a.src = ''; resolve(true); };
        a.oncanplay = () => { a.src = ''; resolve(true); };
        a.onerror = () => resolve(false);
        a.src = url + '?t=' + Date.now();
        // Timeout fallback in case neither event fires
        setTimeout(() => resolve(false), 3000);
    });
}

async function scanAll() {
    document.querySelector('.scan-btn').textContent = 'Scanning...';
    const imgProbes = Object.keys(SCENE_DATA).concat(Object.keys(ITEM_DATA)).map(async id => {
        foundImages[id] = await probeImage(getImagePath(id));
    });
    const audProbes = Object.keys(AUDIO_DATA).map(async id => {
        foundAudio[id] = await probeAudio(getAudioPath(id));
    });
    await Promise.all([...imgProbes, ...audProbes]);
    document.querySelector('.scan-btn').textContent = 'Scan Files';
    updateStats();
    renderImageGrid(curImgFilter, curImgSearch);
    renderAudioGrid(curAudFilter, curAudSearch);
    toast('Scan complete');
}

// ============================================
// PROMPT DATA
// ============================================
const STYLE_PREFIX = 'Pixel art, 16:9 aspect ratio, retro pixel art style reminiscent of early 1990s LucasArts adventure games. Limited but expressive color palette. Dithering for gradients. No anti-aliasing.';
const PALETTES = {
    'Warm Morning': 'Golden amber (#D4A03C), soft peach (#E8B87A), dusty rose (#C4826E). Shadow: muted olive (#6B6340), soft brown (#5A4A2A). Accent: pale sky blue (#8CB4D0), warm white (#F0E4C8).',
    'Harsh Noon': 'Bright white (#F0F0E0), vivid blue sky (#4A90D0), hot yellow (#E8D040). Shadow: cool grey (#5A5A6A). Accent: red (#D04030), taxi yellow (#E8C020).',
    'Moody Night': 'Deep navy (#0A0A2E), midnight blue (#1A1A3E), charcoal (#1A1A1A). Warm: amber streetlight (#D09030). Accent: cold TV blue (#6080C0), moonlight silver (#A0B0C0).',
    'Neon Nightlife': 'Neon pink (#E040A0), electric blue (#4080E0), laser green (#40D060), purple (#8040D0). Base: black (#0A0A0A), dark purple (#2A0A3E). Accent: gold (#D0A020).',
    'Desaturated/Drained': 'Washed grey (#8A8A8A), cold blue-grey (#6A7A8A), sickly green (#6A7A5A). Minimal warmth.',
};
const CHARACTERS = {
    MC:'MC: Young man, early 20s, dark hair, sunglasses. Casual 90s attire or better dressed later.',
    Diana:'Diana: Early 20s, auburn messy hair, headphones around neck, band tee, denim jacket.',
    Vinnie:'Vinnie: 50s Italian, thick mustache going grey, rumpled button-down, rolled sleeves.',
    Marcus:'Marcus: Early 30s, slicked hair, white shirt, suspenders, loosened tie, pager.',
    Ray:'Ray: Late 20s, wiry, leather jacket, dark jeans, aviator sunglasses, toothpick.',
    MrsChen:'Mrs. Chen: 40s Asian woman, navy blazer, pearl earrings, elegant glasses.',
    Tony:'Tony: 40s, stocky, gold chains, open silk shirt, rings, broad smile.',
};

let scenePromptTexts = {};
async function loadScenePrompts() {
    try {
        const text = await (await fetch('SCENE_PROMPTS.md')).text();
        for (const block of text.split(/####\s+/)) {
            const m = block.match(/`([a-z_]+)\.png`/);
            if (!m) continue;
            const id = m[1];
            const p = block.match(/\*\*Image prompt\*\*:\s*([\s\S]*?)(?=\n\n\*\*|$)/);
            const c = block.match(/\*\*Character note\*\*:\s*([\s\S]*?)(?=\n\n\*\*|$)/);
            const mo = block.match(/\*\*Mood\/palette\*\*:\s*([\s\S]*?)(?=\n\n\*\*|$)/);
            scenePromptTexts[id] = { prompt: p?p[1].trim():'', charNote: c?c[1].trim():'', moodNote: mo?mo[1].trim():'' };
        }
        // Item table rows
        const rows = text.match(/\|\s*`([a-z_]+)\.png`\s*\|\s*([^|]+)\|/g) || [];
        rows.forEach(row => {
            const m2 = row.match(/`([a-z_]+)\.png`\s*\|\s*(.+)\|/);
            if (m2) scenePromptTexts[m2[1]] = { prompt: m2[2].trim(), charNote:'', moodNote:'' };
        });
    } catch(e) { console.warn('SCENE_PROMPTS.md not found'); }
}

function guessMood(id) {
    if (id.match(/night|_night/)) return 'Moody Night';
    if (id.match(/morning/)) return 'Warm Morning';
    if (id.match(/noon|daytime/)) return 'Harsh Noon';
    if (id.match(/nightclub|casino|neon|celebration/)) return 'Neon Nightlife';
    if (id.match(/gameover|burnout|bankrupt|breakup|betrayal|lose/)) return 'Desaturated/Drained';
    if (id.match(/win|proposal|confession|success|grateful/)) return 'Warm Morning';
    if (id.match(/evening/)) return 'Moody Night';
    return 'Warm Morning';
}
function guessChars(id) {
    const c = [];
    if (id.match(/diana|coffee_date|dinner_date|proposal|win_ending/)) c.push('Diana');
    if (id.match(/vinnie|pawnshop_selling/)) c.push('Vinnie');
    if (id.match(/marcus|stock_t|brokerage_intro/)) c.push('Marcus');
    if (id.match(/^ray_/)) c.push('Ray');
    if (id.match(/chen/)) c.push('MrsChen');
    if (id.match(/tony/)) c.push('Tony');
    if (id.match(/activity_|special_day1|act\d_to|gameover|win_ending/)) c.push('MC');
    return c;
}

function buildFullPrompt(id) {
    const isItem = !!ITEM_DATA[id];
    const raw = scenePromptTexts[id] || {};
    if (isItem) {
        const sz = ITEM_DATA[id].size;
        const desc = raw.prompt || ITEM_DATA[id].label + ', pixel art sprite.';
        const full = `Pixel art sprite, ${sz}x${sz} pixels, transparent background, retro 1990s game item icon style. ${desc}`;
        return { full, sections: { 'Style': `Pixel art sprite, ${sz}x${sz}px, transparent bg`, 'Description': desc } };
    }
    const mood = guessMood(id);
    const palette = PALETTES[mood] || '';
    const desc = raw.prompt || (SCENE_DATA[id]||{}).label + ', 1990s aesthetic.';
    const full = `${STYLE_PREFIX}\n\nColor palette (${mood}): ${palette}\n\n${desc}`;
    const sections = { 'Style prefix': STYLE_PREFIX, 'Mood & palette': `${mood}: ${palette}`, 'Scene prompt': desc };
    if (raw.charNote) sections['Character note (reference only)'] = raw.charNote;
    const chars = guessChars(id);
    return { full, sections, chars };
}

// ============================================
// UI HELPERS
// ============================================
function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}
function updateStats() {
    const ti = Object.keys(SCENE_DATA).length + Object.keys(ITEM_DATA).length;
    const fi = Object.values(foundImages).filter(Boolean).length;
    const ta = Object.keys(AUDIO_DATA).length;
    const fa = Object.values(foundAudio).filter(Boolean).length;
    document.getElementById('stat-images').innerHTML = `Images: <b>${fi}</b> / <span>${ti}</span>`;
    document.getElementById('stat-audio').innerHTML = `Audio: <b>${fa}</b> / <span>${ta}</span>`;
}

// ============================================
// IMAGE TAB
// ============================================
let curImgFilter = 'all', curImgSearch = '';

function renderImageGrid(filter, search) {
    const grid = document.getElementById('image-grid');
    grid.innerHTML = '';
    const all = { ...SCENE_DATA, ...ITEM_DATA };
    Object.entries(all).forEach(([id, data]) => {
        const isFound = !!foundImages[id];
        if (filter && filter !== 'all') {
            if (filter === 'found' && !isFound) return;
            if (filter === 'missing' && isFound) return;
            if (!['found','missing'].includes(filter) && data.cat !== filter) return;
        }
        if (search && !data.label.toLowerCase().includes(search) && !id.includes(search)) return;

        const isItem = !!ITEM_DATA[id];
        const path = getImagePath(id);
        const card = document.createElement('div');
        card.className = 'image-card' + (isFound ? ' found' : '');
        card.innerHTML = `
            <div class="card-preview${isItem ? ' square' : ''}" onclick="pickAndCopyImage('${id}')">
                ${isFound
                    ? `<img src="${path}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'" alt="${id}"><div class="placeholder" style="display:none"><span class="plus">+</span></div>`
                    : `<div class="placeholder"><span class="plus">+</span><span class="plus-text">${isItem ? data.size+'x'+data.size : '1280x720'}</span></div>`}
            </div>
            <div class="card-info">
                <div class="card-title">${id}.png</div>
                <div class="card-category">${data.label}</div>
                <div class="card-path">${path}</div>
                <div class="card-status">${isFound ? 'Found on disk' : 'Missing — drop file at path above'}</div>
                <div class="card-actions">
                    <button class="card-btn" onclick="pickAndCopyImage('${id}')">+ Add file</button>
                    <button class="card-btn" onclick="copyPath('${path}')">Copy path</button>
                </div>
            </div>`;
        grid.appendChild(card);
    });
}

// When user clicks +: they pick a file, we offer a download with the correct filename
// so they can drop it into shared_assets/images/
function pickAndCopyImage(id) {
    const picker = document.getElementById('file-picker-img');
    picker.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const isItem = !!ITEM_DATA[id];
        const targetName = id + '.png';
        const targetFolder = isItem ? 'shared_assets/images/items/' : 'shared_assets/images/';

        // Create a download link with the correct filename
        const url = URL.createObjectURL(file);
        const a = document.createElement('a');
        a.href = url;
        a.download = targetName;
        a.click();
        URL.revokeObjectURL(url);

        toast(`Saved as "${targetName}" — move it to ${targetFolder}`);
        picker.value = '';

        // Mark as found optimistically and show preview
        foundImages[id] = true;
        updateStats();
        renderImageGrid(curImgFilter, curImgSearch);
    };
    picker.click();
}

function copyPath(path) {
    navigator.clipboard.writeText(path).then(() => toast('Path copied'));
}

// ============================================
// AUDIO TAB
// ============================================
let curAudFilter = 'all', curAudSearch = '';
let playingAudio = null, playingId = null;

function renderAudioGrid(filter, search) {
    const grid = document.getElementById('audio-grid');
    grid.innerHTML = '';
    Object.entries(AUDIO_DATA).forEach(([id, data]) => {
        const isFound = !!foundAudio[id];
        if (filter && filter !== 'all') {
            if (filter === 'found' && !isFound) return;
            if (filter === 'missing' && isFound) return;
            if (!['found','missing'].includes(filter) && data.type !== filter) return;
        }
        if (search && !data.label.toLowerCase().includes(search) && !id.includes(search)) return;

        const path = getAudioPath(id);
        const isPlaying = playingId === id;
        const card = document.createElement('div');
        card.className = 'audio-card' + (isFound ? ' found' : '');
        card.innerHTML = `
            <div class="audio-icon ${data.type} ${isPlaying?'playing':''}" onclick="togglePlay('${id}')" title="${isFound ? 'Play' : 'Not found'}">
                ${isPlaying ? '&#9646;&#9646;' : data.type==='music' ? '&#9835;' : data.type==='ambient' ? '&#127754;' : '&#9654;'}
            </div>
            <div class="audio-info">
                <div class="audio-name">${data.label}</div>
                <div class="audio-type">${data.type}${isFound ? ' &middot; <span style="color:var(--green)">found</span>' : ''}</div>
                <div class="audio-path">${path}</div>
            </div>
            <button class="audio-file-btn" onclick="pickAndCopyAudio('${id}')">+ Add</button>
            <button class="audio-file-btn" onclick="copyPath('${path}')">Path</button>`;
        grid.appendChild(card);
    });
}

function togglePlay(id) {
    if (playingId === id && playingAudio) {
        playingAudio.pause(); playingAudio = null; playingId = null;
        renderAudioGrid(curAudFilter, curAudSearch); return;
    }
    if (playingAudio) { playingAudio.pause(); playingAudio = null; }
    const path = getAudioPath(id);
    try {
        playingAudio = new Audio(path);
        playingId = id;
        playingAudio.play().catch(() => { toast('Cannot play — file missing'); playingId = null; });
        playingAudio.onended = () => { playingId = null; playingAudio = null; renderAudioGrid(curAudFilter, curAudSearch); };
        renderAudioGrid(curAudFilter, curAudSearch);
    } catch(e) { toast('Playback error'); }
}

function pickAndCopyAudio(id) {
    const picker = document.getElementById('file-picker-aud');
    picker.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const targetName = id + '.mp3';
        const url = URL.createObjectURL(file);
        const a = document.createElement('a');
        a.href = url; a.download = targetName; a.click();
        URL.revokeObjectURL(url);
        toast(`Saved as "${targetName}" — move it to shared_assets/audio/`);
        picker.value = '';
        foundAudio[id] = true;
        updateStats();
        renderAudioGrid(curAudFilter, curAudSearch);
    };
    picker.click();
}

// ============================================
// PROMPT TAB
// ============================================
let curPrmFilter = 'all', curPrmSearch = '';

function renderPromptGrid(filter, search) {
    const grid = document.getElementById('prompt-grid');
    grid.innerHTML = '';
    const allIds = [...Object.keys(SCENE_DATA), ...Object.keys(ITEM_DATA)];
    allIds.forEach(id => {
        const isItem = !!ITEM_DATA[id];
        const data = SCENE_DATA[id] || ITEM_DATA[id];
        if (filter === 'scene' && isItem) return;
        if (filter === 'item' && !isItem) return;
        if (search && !data.label.toLowerCase().includes(search) && !id.includes(search)) return;

        const { full, sections, chars } = buildFullPrompt(id);
        let sectionsHtml = '';
        Object.entries(sections).forEach(([label, text]) => {
            const sid = `p_${id}_${label.replace(/\W/g,'_')}`;
            sectionsHtml += `<div class="prompt-section"><div class="prompt-label">${label}</div><div class="prompt-text" id="${sid}">${text}<button class="copy-btn" onclick="copyEl(event,'${sid}')">Copy</button></div></div>`;
        });
        let charHtml = '';
        if (chars && chars.length) {
            charHtml = `<div class="prompt-section"><div class="prompt-label">Character refs (for steering — do not paste)</div><div class="prompt-note">${chars.map(c => CHARACTERS[c]||c).join('<br>')}</div></div>`;
        }
        const fid = `full_${id}`;
        const card = document.createElement('div');
        card.className = 'prompt-card';
        card.innerHTML = `
            <div class="prompt-header" onclick="this.parentElement.classList.toggle('open')">
                <div class="prompt-title">${id}.png — ${data.label}</div>
                <div class="prompt-badge">${isItem ? 'ITEM' : data.cat}</div>
            </div>
            <div class="prompt-body">
                ${sectionsHtml}${charHtml}
                <div class="prompt-section"><div class="prompt-label">Full prompt (copy this)</div><div class="prompt-text" id="${fid}">${full}<button class="copy-btn" onclick="copyEl(event,'${fid}')">Copy</button></div></div>
            </div>`;
        grid.appendChild(card);
    });
}

function copyEl(e, elId) {
    e.stopPropagation();
    const el = document.getElementById(elId);
    if (!el) return;
    const text = el.innerText.replace(/Copy(ed)?!?\s*$/,'').trim();
    navigator.clipboard.writeText(text).then(() => {
        const btn = el.querySelector('.copy-btn');
        btn.textContent = 'Copied!'; btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
    });
}

// ============================================
// WIRING
// ============================================
document.querySelectorAll('.nav-tab').forEach(t => t.addEventListener('click', () => {
    document.querySelectorAll('.nav-tab').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    document.getElementById('panel-' + t.dataset.tab).classList.add('active');
}));
document.querySelectorAll('[data-filter]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); curImgFilter = b.dataset.filter; renderImageGrid(curImgFilter, curImgSearch);
}));
document.getElementById('search-images').addEventListener('input', e => { curImgSearch = e.target.value.toLowerCase(); renderImageGrid(curImgFilter, curImgSearch); });

document.querySelectorAll('[data-filter-audio]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-filter-audio]').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); curAudFilter = b.dataset.filterAudio; renderAudioGrid(curAudFilter, curAudSearch);
}));
document.getElementById('search-audio').addEventListener('input', e => { curAudSearch = e.target.value.toLowerCase(); renderAudioGrid(curAudFilter, curAudSearch); });

document.querySelectorAll('[data-filter-prompt]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-filter-prompt]').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); curPrmFilter = b.dataset.filterPrompt; renderPromptGrid(curPrmFilter, curPrmSearch);
}));
document.getElementById('search-prompts').addEventListener('input', e => { curPrmSearch = e.target.value.toLowerCase(); renderPromptGrid(curPrmFilter, curPrmSearch); });

// ============================================
// INIT
// ============================================
async function init() {
    await loadScenePrompts();
    renderImageGrid('all','');
    renderAudioGrid('all','');
    renderPromptGrid('all','');
    updateStats();
    // Auto-scan on load
    scanAll();
}
init();
</script>
