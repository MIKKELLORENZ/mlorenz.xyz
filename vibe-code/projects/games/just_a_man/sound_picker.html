<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a Man — Sound Picker</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg: #0f0f13;
    --bg2: #16161d;
    --bg3: #1e1e28;
    --bg4: #282835;
    --border: #2a2a3a;
    --border-light: #3a3a4e;
    --text: #e0e0e8;
    --text-dim: #7a7a90;
    --accent: #e2b714;
    --accent-dim: rgba(226,183,20,0.15);
    --green: #44cc66;
    --red: #cc4444;
    --blue: #4488dd;
    --pink: #dd4488;
    --radius: 6px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

.header {
    background: var(--bg2); border-bottom: 1px solid var(--border);
    padding: 16px 24px; display: flex; align-items: center; gap: 16px;
    position: sticky; top: 0; z-index: 100;
}
.header-title { font-weight: 700; font-size: 14px; color: var(--accent); letter-spacing: 1px; }
.header-subtitle { font-size: 12px; color: var(--text-dim); }
.header-spacer { flex: 1; }
.header-stat { font-size: 11px; color: var(--text-dim); padding: 4px 10px; background: var(--bg3); border-radius: 12px; }
.header-stat b { color: var(--green); }

.toolbar {
    display: flex; align-items: center; gap: 12px; padding: 12px 24px;
    background: var(--bg2); border-bottom: 1px solid var(--border); flex-wrap: wrap;
}
.search-box {
    flex: 1; min-width: 200px; padding: 8px 14px; background: var(--bg3);
    border: 1px solid var(--border); border-radius: var(--radius); color: var(--text);
    font-size: 13px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.filter-btn {
    padding: 6px 14px; font-size: 12px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: var(--radius); color: var(--text-dim); cursor: pointer; transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }

.container { padding: 20px 24px; }

/* Sound slot card */
.slot-card {
    background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
    margin-bottom: 12px; overflow: hidden;
}
.slot-card.has-pick { border-color: var(--green); }

.slot-header {
    display: flex; align-items: center; gap: 12px; padding: 12px 16px;
    cursor: pointer; user-select: none;
}
.slot-header:hover { background: var(--bg3); }
.slot-expand { color: var(--text-dim); font-size: 12px; transition: transform 0.2s; width: 16px; }
.slot-card.open .slot-expand { transform: rotate(90deg); }
.slot-icon {
    width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center;
    justify-content: center; font-size: 12px; flex-shrink: 0;
}
.slot-icon.music { background: rgba(68,136,221,0.15); color: var(--blue); }
.slot-icon.ambient { background: rgba(68,204,102,0.15); color: var(--green); }
.slot-icon.sfx { background: rgba(221,68,136,0.15); color: var(--pink); }
.slot-name { font-size: 12px; font-weight: 600; flex: 1; }
.slot-status { font-size: 10px; color: var(--text-dim); }
.slot-status.picked { color: var(--green); }
.slot-count { font-size: 10px; color: var(--text-dim); background: var(--bg4); padding: 2px 8px; border-radius: 10px; }

.slot-body { display: none; padding: 0 16px 12px; }
.slot-card.open .slot-body { display: block; }

/* Option row */
.option-row {
    display: flex; align-items: center; gap: 10px; padding: 8px 12px;
    border-radius: 4px; transition: background 0.15s; margin-bottom: 2px;
}
.option-row:hover { background: var(--bg4); }
.option-row.playing { background: rgba(68,136,221,0.1); }
.option-row.picked { background: rgba(68,204,102,0.08); border: 1px solid rgba(68,204,102,0.3); }

.play-btn {
    width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border);
    background: var(--bg3); color: var(--text-dim); cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-size: 10px; flex-shrink: 0;
    transition: all 0.15s;
}
.play-btn:hover { border-color: var(--accent); color: var(--accent); }
.play-btn.playing { background: var(--blue); border-color: var(--blue); color: white; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }

.option-label { font-size: 11px; flex: 1; color: var(--text); }
.option-file { font-size: 9px; color: var(--text-dim); font-family: monospace; }

.pick-btn {
    padding: 4px 12px; font-size: 10px; background: var(--bg3); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text-dim); cursor: pointer; transition: all 0.15s; flex-shrink: 0;
}
.pick-btn:hover { background: var(--accent-dim); color: var(--accent); border-color: var(--accent); }
.pick-btn.picked { background: rgba(68,204,102,0.15); color: var(--green); border-color: var(--green); }

.delete-btn {
    padding: 4px 8px; font-size: 10px; background: transparent; border: 1px solid transparent;
    border-radius: 4px; color: var(--text-dim); cursor: pointer; transition: all 0.15s; flex-shrink: 0;
    opacity: 0.4;
}
.delete-btn:hover { opacity: 1; color: var(--red); border-color: var(--red); }

/* Waveform */
.waveform-container {
    width: 120px; height: 24px; flex-shrink: 0; background: var(--bg4);
    border-radius: 3px; overflow: hidden; position: relative;
}
.waveform-canvas { width: 100%; height: 100%; }
.waveform-progress {
    position: absolute; top: 0; left: 0; height: 100%; width: 0;
    background: rgba(68,136,221,0.2); pointer-events: none;
}

/* Toast */
.toast {
    position: fixed; bottom: 24px; right: 24px; padding: 10px 20px;
    background: var(--bg3); border: 1px solid var(--green); border-radius: var(--radius);
    color: var(--green); font-size: 12px; z-index: 200;
    opacity: 0; transform: translateY(10px); transition: all 0.3s; pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* Batch actions */
.batch-bar {
    display: flex; align-items: center; gap: 12px; padding: 10px 24px;
    background: var(--bg3); border-bottom: 1px solid var(--border);
}
.batch-btn {
    padding: 6px 16px; font-size: 11px; background: var(--accent-dim); border: 1px solid var(--accent);
    border-radius: 4px; color: var(--accent); cursor: pointer; font-weight: 500;
}
.batch-btn:hover { background: var(--accent); color: var(--bg); }
.batch-btn.danger { background: rgba(204,68,68,0.1); border-color: var(--red); color: var(--red); }
.batch-btn.danger:hover { background: var(--red); color: white; }
.batch-info { font-size: 11px; color: var(--text-dim); flex: 1; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">SOUND PICKER</div>
    <div class="header-subtitle">Preview options, pick winners, assign to slots</div>
    <div class="header-spacer"></div>
    <div class="header-stat" id="stat-picked">Assigned: <b>0</b> / <span>0</span></div>
    <div class="header-stat" id="stat-total">Candidates: <b>0</b></div>
</div>

<div class="toolbar">
    <input class="search-box" id="search" placeholder="Search sound slots...">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="sfx">SFX</button>
    <button class="filter-btn" data-filter="ambient">Ambient</button>
    <button class="filter-btn" data-filter="music">Music</button>
    <button class="filter-btn" data-filter="picked">Picked</button>
    <button class="filter-btn" data-filter="unpicked">Unpicked</button>
</div>

<div class="batch-bar">
    <button class="batch-btn" onclick="autoPickFirst()">Auto-pick first option for unpicked slots</button>
    <button class="batch-btn" onclick="expandAll()">Expand All</button>
    <button class="batch-btn" onclick="collapseAll()">Collapse All</button>
    <div class="batch-info">Pick a sound for each slot. The picked file will be copied to the correct filename.</div>
</div>

<div class="container" id="slots-container"></div>
<div class="toast" id="toast"></div>

<script>
const AUDIO_BASE = '../../shared_assets/audio/';
const CANDIDATES_BASE = AUDIO_BASE + 'candidates/';

let manifest = {};
let picks = {}; // slot -> optFile
let currentAudio = null;
let currentPlayingSlot = null;
let currentPlayingOpt = null;

// Load picks from localStorage
try {
    const saved = localStorage.getItem('justaman_sound_picks');
    if (saved) picks = JSON.parse(saved);
} catch(e) {}

function savePicks() {
    localStorage.setItem('justaman_sound_picks', JSON.stringify(picks));
}

function getSlotType(slot) {
    if (slot.startsWith('sfx_')) return 'sfx';
    if (slot.startsWith('amb_')) return 'ambient';
    if (slot.startsWith('music_')) return 'music';
    return 'sfx';
}

function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
}

function updateStats() {
    const totalSlots = Object.keys(manifest).length;
    const pickedSlots = Object.keys(picks).filter(s => manifest[s]).length;
    const totalCandidates = Object.values(manifest).reduce((s, opts) => s + opts.length, 0);
    document.getElementById('stat-picked').innerHTML = `Assigned: <b>${pickedSlots}</b> / <span>${totalSlots}</span>`;
    document.getElementById('stat-total').innerHTML = `Candidates: <b>${totalCandidates}</b>`;
}

function stopAudio() {
    if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
        currentPlayingSlot = null;
        currentPlayingOpt = null;
    }
}

function playOption(slot, optFile) {
    // If same option, toggle off
    if (currentPlayingSlot === slot && currentPlayingOpt === optFile) {
        stopAudio();
        render();
        return;
    }
    stopAudio();

    const url = CANDIDATES_BASE + slot + '/' + optFile;
    currentAudio = new Audio(url);
    currentPlayingSlot = slot;
    currentPlayingOpt = optFile;
    currentAudio.play().catch(() => toast('Cannot play - file missing'));
    currentAudio.onended = () => {
        currentPlayingSlot = null;
        currentPlayingOpt = null;
        currentAudio = null;
        render();
    };
    render();
}

function pickOption(slot, optFile) {
    picks[slot] = optFile;
    savePicks();
    render();
    toast(`Picked ${optFile} for ${slot}`);
}

function unpickSlot(slot) {
    delete picks[slot];
    savePicks();
    render();
}

function assignPick(slot) {
    // Copy the picked candidate file to the main audio directory with the correct name
    // Since we're in the browser, we can't do filesystem ops directly.
    // Instead, we'll create a download link that saves the file with the right name.
    const optFile = picks[slot];
    if (!optFile) return;

    const url = CANDIDATES_BASE + slot + '/' + optFile;
    const targetName = slot + '.mp3';

    // Fetch and re-download with correct filename
    fetch(url)
        .then(r => r.blob())
        .then(blob => {
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = targetName;
            a.click();
            URL.revokeObjectURL(a.href);
            toast(`Downloaded as ${targetName} — move to shared_assets/audio/`);
        })
        .catch(() => toast('Failed to download'));
}

function autoPickFirst() {
    let count = 0;
    for (const slot of Object.keys(manifest)) {
        if (!picks[slot] && manifest[slot].length > 0) {
            picks[slot] = manifest[slot][0].file;
            count++;
        }
    }
    savePicks();
    render();
    toast(`Auto-picked ${count} slots`);
}

function expandAll() {
    document.querySelectorAll('.slot-card').forEach(c => c.classList.add('open'));
}
function collapseAll() {
    document.querySelectorAll('.slot-card').forEach(c => c.classList.remove('open'));
}

// Batch assign all picks — copy files using a generated script
function generateAssignScript() {
    const lines = ['#!/bin/bash', '# Copy picked sounds to shared_assets/audio/', 'AUDIO_DIR="../../shared_assets/audio"', 'CANDIDATES_DIR="$AUDIO_DIR/candidates"', ''];
    for (const [slot, optFile] of Object.entries(picks)) {
        if (manifest[slot]) {
            lines.push(`cp "$CANDIDATES_DIR/${slot}/${optFile}" "$AUDIO_DIR/${slot}.mp3"`);
        }
    }
    return lines.join('\n');
}

let curFilter = 'all';
let curSearch = '';

function render() {
    const container = document.getElementById('slots-container');
    const wasOpen = new Set();
    container.querySelectorAll('.slot-card.open').forEach(c => wasOpen.add(c.dataset.slot));
    container.innerHTML = '';

    const slots = Object.keys(manifest).sort((a, b) => {
        const ta = getSlotType(a), tb = getSlotType(b);
        if (ta !== tb) {
            const order = { sfx: 0, ambient: 1, music: 2 };
            return (order[ta] || 0) - (order[tb] || 0);
        }
        return a.localeCompare(b);
    });

    for (const slot of slots) {
        const type = getSlotType(slot);
        const options = manifest[slot] || [];
        const picked = picks[slot];

        // Filter
        if (curFilter !== 'all') {
            if (curFilter === 'picked' && !picked) continue;
            if (curFilter === 'unpicked' && picked) continue;
            if (!['picked', 'unpicked'].includes(curFilter) && type !== curFilter) continue;
        }
        if (curSearch && !slot.includes(curSearch)) continue;

        const card = document.createElement('div');
        card.className = 'slot-card' + (picked ? ' has-pick' : '') + (wasOpen.has(slot) ? ' open' : '');
        card.dataset.slot = slot;

        const pickedLabel = picked ? options.find(o => o.file === picked)?.label || picked : '';

        card.innerHTML = `
            <div class="slot-header" onclick="this.parentElement.classList.toggle('open')">
                <span class="slot-expand">&#9654;</span>
                <div class="slot-icon ${type}">${type === 'music' ? '&#9835;' : type === 'ambient' ? '&#127754;' : '&#9654;'}</div>
                <div class="slot-name">${slot}</div>
                <div class="slot-status ${picked ? 'picked' : ''}">${picked ? '&#10003; ' + pickedLabel : 'no pick'}</div>
                <div class="slot-count">${options.length} options</div>
            </div>
            <div class="slot-body">
                ${options.map(opt => {
                    const isPlaying = currentPlayingSlot === slot && currentPlayingOpt === opt.file;
                    const isPicked = picked === opt.file;
                    return `
                    <div class="option-row ${isPlaying ? 'playing' : ''} ${isPicked ? 'picked' : ''}">
                        <button class="play-btn ${isPlaying ? 'playing' : ''}" onclick="event.stopPropagation();playOption('${slot}','${opt.file}')" title="Play">
                            ${isPlaying ? '&#9646;&#9646;' : '&#9654;'}
                        </button>
                        <div class="option-label">${opt.label}</div>
                        <div class="option-file">${opt.file}</div>
                        <button class="pick-btn ${isPicked ? 'picked' : ''}" onclick="event.stopPropagation();pickOption('${slot}','${opt.file}')" title="Pick this sound">
                            ${isPicked ? '&#10003; Picked' : 'Pick'}
                        </button>
                    </div>`;
                }).join('')}
                ${picked ? `
                <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
                    <button class="pick-btn picked" onclick="event.stopPropagation();assignPick('${slot}')" style="font-weight:600">
                        &#8595; Download as ${slot}.mp3
                    </button>
                    <button class="delete-btn" onclick="event.stopPropagation();unpickSlot('${slot}')" style="opacity:0.7">
                        Clear pick
                    </button>
                </div>` : ''}
            </div>`;
        container.appendChild(card);
    }
    updateStats();
}

// Wiring
document.querySelectorAll('[data-filter]').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('[data-filter]').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    curFilter = b.dataset.filter;
    render();
}));
document.getElementById('search').addEventListener('input', e => {
    curSearch = e.target.value.toLowerCase();
    render();
});

// Init
async function init() {
    try {
        const resp = await fetch(CANDIDATES_BASE + 'manifest.json');
        manifest = await resp.json();
    } catch(e) {
        document.getElementById('slots-container').innerHTML = `
            <div style="padding:40px;text-align:center;color:var(--text-dim)">
                <p style="font-size:14px;margin-bottom:8px">Could not load manifest.json</p>
                <p style="font-size:12px">Run <code style="color:var(--accent)">node download_sounds.js</code> first to download candidate sounds.</p>
                <p style="font-size:11px;margin-top:12px">Make sure to serve this file via a local HTTP server (e.g. <code style="color:var(--accent)">npx serve .</code>)</p>
            </div>`;
        return;
    }
    render();
}
init();
</script>
</body>
</html>
