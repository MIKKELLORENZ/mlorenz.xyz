<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Just a Man</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
</head>
<body>
    <div id="game-container">
        <!-- Scene background -->
        <div id="scene-layer">
            <img id="scene-bg" src="" alt="">
            <div id="scene-placeholder"></div>
        </div>

        <!-- Top HUD -->
        <div id="hud-top">
            <span id="hud-title">JUST A MAN</span>
            <span id="hud-day">Day 1</span>
            <span id="hud-time">Morning</span>
            <span id="hud-cash">$50</span>
            <div id="hud-buttons">
                <button id="btn-inventory" class="hud-btn">INV</button>
                <button id="btn-save" class="hud-btn">SAVE</button>
                <button id="btn-menu" class="hud-btn">MENU</button>
            </div>
        </div>

        <!-- Bottom stat bars -->
        <div id="hud-bottom">
            <div class="stat-bar">
                <span class="stat-label">REP</span>
                <div class="stat-track"><div class="stat-fill stat-rep" style="width:0%"></div></div>
                <span class="stat-value" id="stat-rep-val">0</span>
            </div>
            <div class="stat-bar">
                <span class="stat-label">CHARM</span>
                <div class="stat-track"><div class="stat-fill stat-charm" style="width:10%"></div></div>
                <span class="stat-value" id="stat-charm-val">10</span>
            </div>
            <div class="stat-bar">
                <span class="stat-label">STRESS</span>
                <div class="stat-track"><div class="stat-fill stat-stress" style="width:0%"></div></div>
                <span class="stat-value" id="stat-stress-val">0</span>
            </div>
        </div>

        <!-- Dialog overlay -->
        <div id="dialog-overlay" class="hidden">
            <div id="dialog-box">
                <div id="dialog-speaker"></div>
                <div id="dialog-text"></div>
                <div id="dialog-choices"></div>
                <div id="dialog-continue" class="hidden">Click to continue...</div>
            </div>
        </div>

        <!-- Location map overlay -->
        <div id="location-overlay" class="hidden">
            <div id="location-map">
                <div id="location-title">WHERE TO?</div>
                <div id="location-grid"></div>
                <button id="location-cancel" class="hud-btn">CANCEL</button>
            </div>
        </div>

        <!-- Action menu overlay -->
        <div id="action-overlay" class="hidden">
            <div id="action-menu">
                <div id="action-title"></div>
                <div id="action-buttons"></div>
            </div>
        </div>

        <!-- Shop overlay -->
        <div id="shop-overlay" class="hidden">
            <div id="shop-panel">
                <div id="shop-title"></div>
                <div id="shop-items"></div>
                <button id="shop-close" class="hud-btn">CLOSE</button>
            </div>
        </div>

        <!-- Stock trading overlay -->
        <div id="stock-overlay" class="hidden">
            <div id="stock-panel">
                <div id="stock-title">BULL & BEAR BROKERAGE</div>
                <div id="stock-tip" class="hidden"></div>
                <div id="stock-list"></div>
                <div id="stock-portfolio"></div>
                <button id="stock-close" class="hud-btn">CLOSE</button>
            </div>
        </div>

        <!-- Inventory overlay -->
        <div id="inventory-overlay" class="hidden">
            <div id="inventory-panel">
                <div id="inventory-title">INVENTORY</div>
                <div id="inventory-items"></div>
                <button id="inventory-close" class="hud-btn">CLOSE</button>
            </div>
        </div>

        <!-- Loading bar overlay -->
        <div id="loading-overlay" class="hidden">
            <div id="loading-bar-container">
                <div id="loading-bar-fill"></div>
            </div>
            <div id="loading-text"></div>
        </div>

        <!-- Notification toast -->
        <div id="notification" class="hidden"></div>

        <!-- Title screen -->
        <div id="title-screen">
            <div id="title-text">JUST A MAN</div>
            <div id="title-subtitle">A 1990s Hustle Story</div>
            <div id="title-menu">
                <button id="btn-new-game" class="title-btn">NEW GAME</button>
                <button id="btn-continue" class="title-btn hidden">CONTINUE</button>
            </div>
        </div>

        <!-- Game over screen -->
        <div id="gameover-screen" class="hidden">
            <div id="gameover-title"></div>
            <div id="gameover-text"></div>
            <div id="gameover-stats"></div>
            <button id="btn-restart" class="title-btn">TRY AGAIN</button>
        </div>

        <!-- Win screen -->
        <div id="win-screen" class="hidden">
            <div id="win-title">YOU MADE IT</div>
            <div id="win-text"></div>
            <div id="win-stats"></div>
            <button id="btn-play-again" class="title-btn">PLAY AGAIN</button>
        </div>
    </div>

    <script src="js/constants.js"></script>
    <script src="js/state.js"></script>
    <script src="js/probability.js"></script>
    <script src="js/scenes.js"></script>
    <script src="js/npcs.js"></script>
    <script src="js/locations.js"></script>
    <script src="js/dialogs.js"></script>
    <script src="js/story.js"></script>
    <script src="js/audio.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/engine.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
