<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Matrix Live Wallpaper</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="matrix-canvas"></canvas>

    <!-- Top Bar (auto-hides) -->
    <div id="top-bar" class="top-bar">
        <div class="top-bar-left">
            <button id="btn-pause" class="icon-btn" title="Pause/Play (Space)">
                <svg id="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                <svg id="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor" style="display:none"><polygon points="6,4 20,12 6,20"/></svg>
            </button>
            <span id="fps-counter" class="fps-counter">-- FPS</span>
        </div>
        <div class="top-bar-right">
            <button id="btn-screenshot" class="icon-btn" title="Screenshot (S)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M3 8h2M19 8h2"/></svg>
            </button>
            <button id="btn-fullscreen" class="icon-btn" title="Fullscreen (F)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3M16 21h3a2 2 0 002-2v-3"/></svg>
            </button>
            <button id="btn-settings" class="icon-btn" title="Settings (G)">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 15a3 3 0 100-6 3 3 0 000 6z"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 01-2.83 2.83l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
            </button>
        </div>
    </div>

    <!-- Settings Panel (slides in from right) -->
    <div id="settings-panel" class="settings-panel">
        <div class="panel-header">
            <h3>Settings</h3>
            <button id="close-panel" class="icon-btn small">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
            </button>
        </div>

        <!-- Tabs -->
        <div class="tab-bar">
            <button class="tab active" data-tab="rain">Rain</button>
            <button class="tab" data-tab="colors">Colors</button>
            <button class="tab" data-tab="effects">Effects</button>
            <button class="tab" data-tab="presets">Presets</button>
        </div>

        <!-- Rain Tab -->
        <div class="tab-content active" id="tab-rain">
            <div class="setting-group">
                <label>Fall Speed</label>
                <input type="range" id="fall-speed" min="0.5" max="20" step="0.1" value="5">
                <span class="value-display" id="fall-speed-value">5</span>
            </div>
            <div class="setting-group">
                <label>Fade Rate</label>
                <input type="range" id="fade-rate" min="0.01" max="0.15" step="0.005" value="0.05">
                <span class="value-display" id="fade-rate-value">0.05</span>
            </div>
            <div class="setting-group">
                <label>Font Size</label>
                <input type="range" id="font-size" min="8" max="40" step="1" value="18">
                <span class="value-display" id="font-size-value">18</span>
            </div>
            <div class="setting-group">
                <label>Column Density</label>
                <input type="range" id="column-density" min="0.3" max="2" step="0.05" value="1">
                <span class="value-display" id="column-density-value">1.0</span>
            </div>
            <div class="setting-group">
                <label>Depth Layers</label>
                <input type="range" id="depth-layers" min="1" max="4" step="1" value="1">
                <span class="value-display" id="depth-layers-value">1</span>
            </div>
            <div class="setting-group">
                <label>Mutation Rate</label>
                <input type="range" id="mutation-rate" min="0" max="0.1" step="0.005" value="0.02">
                <span class="value-display" id="mutation-rate-value">0.02</span>
            </div>
            <div class="setting-row">
                <label class="toggle-label">
                    <input type="checkbox" id="bold-font">
                    <span class="toggle-switch"></span>
                    Bold Font
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="complete-fade">
                    <span class="toggle-switch"></span>
                    Complete Fade
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="head-bright" checked>
                    <span class="toggle-switch"></span>
                    Bright Head
                </label>
            </div>
            <div class="setting-group full-width">
                <label>Character Sets</label>
                <div class="chip-group">
                    <label class="chip"><input type="checkbox" id="katakana" checked><span>Katakana</span></label>
                    <label class="chip"><input type="checkbox" id="hiragana" checked><span>Hiragana</span></label>
                    <label class="chip"><input type="checkbox" id="numbers" checked><span>Numbers</span></label>
                    <label class="chip"><input type="checkbox" id="latin" checked><span>Latin</span></label>
                    <label class="chip"><input type="checkbox" id="emojis"><span>Emojis</span></label>
                    <label class="chip"><input type="checkbox" id="special"><span>Special</span></label>
                </div>
            </div>
        </div>

        <!-- Colors Tab -->
        <div class="tab-content" id="tab-colors">
            <div class="setting-group">
                <label>Color Mode</label>
                <select id="color-mode">
                    <option value="classic">Classic Green</option>
                    <option value="custom-hue">Custom Hue</option>
                    <option value="rainbow-trails">Rainbow Trails</option>
                    <option value="wave">Color Wave</option>
                    <option value="pulse">Pulse</option>
                    <option value="fire">Fire</option>
                    <option value="ocean">Ocean</option>
                    <option value="neon">Neon</option>
                    <option value="cyberpunk">Cyberpunk</option>
                    <option value="plasma">Plasma</option>
                    <option value="aurora">Aurora</option>
                    <option value="sunset">Sunset</option>
                    <option value="toxic">Toxic</option>
                    <option value="ice">Ice</option>
                    <option value="random">Random</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Hue</label>
                <input type="range" id="hue" min="0" max="360" step="1" value="120">
                <span class="value-display" id="hue-value">120</span>
                <div class="hue-preview" id="hue-preview"></div>
            </div>
            <div class="setting-group">
                <label>Saturation</label>
                <input type="range" id="saturation" min="0" max="100" step="1" value="80">
                <span class="value-display" id="saturation-value">80</span>
            </div>
            <div class="setting-group">
                <label>Brightness</label>
                <input type="range" id="brightness" min="20" max="80" step="1" value="50">
                <span class="value-display" id="brightness-value">50</span>
            </div>
            <div class="setting-group">
                <label>Background</label>
                <select id="bg-mode">
                    <option value="black">Pure Black</option>
                    <option value="dark-tint">Dark Tint</option>
                    <option value="gradient">Gradient</option>
                </select>
            </div>
            <div class="setting-group" id="bg-tint-group" style="display:none">
                <label>BG Tint</label>
                <input type="range" id="bg-tint" min="0" max="30" step="1" value="5">
                <span class="value-display" id="bg-tint-value">5</span>
            </div>
        </div>

        <!-- Effects Tab -->
        <div class="tab-content" id="tab-effects">
            <div class="setting-group">
                <label>Glow Intensity</label>
                <input type="range" id="glow-intensity" min="0" max="40" step="1" value="5">
                <span class="value-display" id="glow-intensity-value">5</span>
            </div>
            <div class="setting-group">
                <label>Glow Radius</label>
                <input type="range" id="glow-radius" min="0" max="40" step="1" value="8">
                <span class="value-display" id="glow-radius-value">8</span>
            </div>
            <div class="setting-group">
                <label>Mouse Effect</label>
                <select id="mouse-effect">
                    <option value="none" selected>None</option>
                    <option value="repel">Repel</option>
                    <option value="attract">Attract</option>
                    <option value="highlight">Highlight</option>
                    <option value="ripple">Ripple</option>
                    <option value="vortex">Vortex</option>
                </select>
            </div>
            <div class="setting-group">
                <label>Mouse Radius</label>
                <input type="range" id="mouse-radius" min="50" max="400" step="10" value="150">
                <span class="value-display" id="mouse-radius-value">150</span>
            </div>
            <div class="setting-group">
                <label>Mouse Strength</label>
                <input type="range" id="mouse-strength" min="0.1" max="3" step="0.1" value="1">
                <span class="value-display" id="mouse-strength-value">1.0</span>
            </div>
            <div class="setting-row">
                <label class="toggle-label">
                    <input type="checkbox" id="click-burst" checked>
                    <span class="toggle-switch"></span>
                    Click Burst
                </label>
                <label class="toggle-label">
                    <input type="checkbox" id="show-fps">
                    <span class="toggle-switch"></span>
                    Show FPS
                </label>
            </div>
        </div>

        <!-- Presets Tab -->
        <div class="tab-content" id="tab-presets">
            <div class="presets-grid" id="presets-grid">
                <!-- Built-in presets -->
            </div>
            <div class="preset-actions">
                <button id="save-preset" class="action-btn">Save Current</button>
                <button id="reset-defaults" class="action-btn secondary">Reset Defaults</button>
            </div>
        </div>
    </div>

    <!-- Save Preset Modal -->
    <div id="save-modal" class="modal" style="display:none">
        <div class="modal-content">
            <h4>Save Preset</h4>
            <input type="text" id="preset-name-input" placeholder="Preset name..." maxlength="30">
            <div class="modal-buttons">
                <button id="modal-save" class="action-btn">Save</button>
                <button id="modal-cancel" class="action-btn secondary">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
