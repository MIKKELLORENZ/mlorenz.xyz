<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Mikkel Lorenz</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" href="/favicon.svg" type="image/svg+xml">
    <link rel="icon" href="/favicon-32.png" sizes="32x32" type="image/png">
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">
    <script>
        // Apply saved theme before first paint to avoid a flash of the wrong theme
        (function () {
            var t = null;
            try { t = localStorage.getItem('theme'); } catch (e) {}
            if (t !== 'dark' && t !== 'light') {
                t = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            }
            document.documentElement.classList.add(t === 'dark' ? 'dark-mode' : 'light-mode');
        })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

    <div class="grain-overlay" aria-hidden="true"></div>

    <nav class="navbar">
        <div class="container">
            <div class="logo">MLORENZ<span class="logo-dot">.</span>XYZ</div>
            <div class="nav-items">
                <a href="/index.html">Home</a>
                <a href="/vibe-code/index.html">Vibe Code</a>
                <a href="/inventions/index.html">Inventions</a>
                <a href="/consultancy/index.html">Consultancy</a>
            </div>
            <button id="theme-toggle" aria-label="Toggle dark mode"></button>
        </div>
    </nav>

    <main class="container" style="display: flex; align-items: center; justify-content: center; flex-grow: 1;">
        <section class="section" style="text-align: center;">
            <p class="hero-kicker">Error 404</p>
            <h1 class="hero-headline" style="margin-bottom: 16px;">
                This page <span class="gradient-text">doesn't exist</span>.
            </h1>
            <p class="hero-sub" style="margin: 0 auto 32px;">
                Maybe it moved, maybe it never existed, maybe it was vibe-coded at 2 AM and quietly deleted.
            </p>
            <a href="/" class="cta-button">Back to Home</a>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2026 — Mikkel Lorenz</p>
        </div>
    </footer>

    <script src="/js/darkmode.js" defer></script>
</body>
</html>
